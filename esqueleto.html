<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*Nome da empresa*</title>
<link rel="stylesheet" href="esqueleto.css"/>
  </head>
  <body>
      <main>
        <!--menu-->
        <div class="css-menu-container">
          <div class="css-menu" data-type="extendedBox" data-for="menu">
            <a href="esqueleto.html">test</a>
            <a href="https://github.com/ClaudioJian/CalculadoraFinanceira.git">teste-Github-Link</a>
            <div class="resizer js-right"></div>
          </div>
          <!--button for open menu-->
          <div style="height: fit-content;">
            <img class="css-img-menu" data-action="open-menu" data-type="extendable" src="image/img_placeholder.jpg">
          </div>
        </div>
        


        <!--selector-->
        <!--data-order ordena os items conforme número-->
        <div class="instrucoes">
          <div class="instrucao i1">O que seria?</div>
          <div class="instrucao i2">Tipo?</div>
          <div class="instrucao i3">Valores investidos<br> sequintes</div>
          <div class="instrucao i4">Prazo</div>
          <div class="instrucao i5">Tipo de gráfico</div>
        </div>
        <!-- Nota: precisamos adicionar no javascript a opção de deixar desligado enquanto não selecionar nenhum dos 2(inves/impos)--> 
        <!--data-targetID: other with same data-targetID will grab selector with data-for="filter"
          se selector tem data-for="filter" -> só pode existir um elemento abaixo dele
        -->
        <div class="selector-container s1">
          <div class="selector" data-action="open-selector" data-type="extendable" data-for="filter" data-targetID="0">
            <div class="investimento" data-type="investimento" data-order="0" >Investimento</div>
          </div>
          <!--items-->
          <div class="css-container-itens" data-type="extendedBox">
            <div class="imposto" data-type="imposto" data-order="1">Imposto</div>
          </div>
        </div>

        <div class="selector-container s2">
          <div class= "selector" data-action="open-selector" data-type="extendable" data-targetID="0">
            <div class="investimento_A" data-type="investimento" data-order="0">Teste1</div>
          </div>
          <!--items-->
          <div class="css-container-itens" data-type="extendedBox">
            <div class="investimento_B" data-type="investimento" data-order="1">Teste2</div>
            <div class="investimento_C" data-type="investimento" data-order="1">Teste2</div>
            <div class="imposto_C" data-type="imposto" data-order="2">Teste3</div>
          </div>
        </div>

        <div class="selector-container s3">
          <div class= "selector" data-action="open-selector" data-type="extendable">
            <div class="imposto_A" data-order="0">teste0</div>
          </div>
          <!--items-->
          <div class="css-container-itens" data-type="extendedBox">
            <div class= "imposto_B" data-order="1">teste1</div>
            <div class= "imposto_C" data-order="2">teste2</div>
          </div>
        </div>

        <div class="insert">
          <div class="prazo"></div>
        </div>

        <div class="selector-container s4">
          <div class="selector" data-action="open-selector" data-type="extendable">
            <div class="gráfico g1" data-order="0"></div>
          </div>
          <!--items-->
          <div class="css-container-itens" data-type="extendedBox">
            <div class="gráfico g2" data-order="1"></div>
            <div class="gráfico g3" data-order="2"></div>
          </div>
        </div>

        <!--buttons-->
        <div class="agrupment_button">
          <button type="button" class="button calc">Calcular</button>
          <button type="button" class="button clear">Limpar tudo</button>
          <button type="button" class="button reset">Resetar</button>
        </div>

            <div>
              <div class="resizer js-top"></div>

              <div class="resizer js-bottom js-right"></div>
            </div>
            <div class="draggrable">
              <p>Calculadora</p>
            </div>
          </div>
        </div>
-->

      </main>
      <script src="./main.js"></script>
  </body>
</html>
